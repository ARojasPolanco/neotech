services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neotech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neotech123}
      POSTGRES_DB: ${POSTGRES_DB:-neotech}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neotech} -d ${POSTGRES_DB:-neotech}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./Backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./Backend/.env
    environment:
      DATABASE_URL: postgresql://neotech:neotech123@postgres:5432/neotech
    ports:
      - "3000:3000"

volumes:
  pgdata:
